<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Считать ворон</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body>

<div>
    <h1>Считать ворон</h1>

    <form id="crowForm">
        <label for="numInput">Введите целое число (количество ворон):</label>
        <input type="number" id="numInput" name="num" step="1" required>
        <button type="button" id="countButton">Считать</button>
    </form>
</div>

<script>
    function getCrowEnding(num) {
        let lastDigit = num % 10;
        let lastTwoDigits = num % 100;

        switch (true) {
            case (lastTwoDigits >= 11 && lastTwoDigits <= 14):
                return "ворон";
            default:
                switch (lastDigit) {
                    case 1:
                        return "ворона";
                    case 2:
                    case 3:
                    case 4:
                        return "вороны";
                    default:
                        return "ворон";
                }
        }
    }

    function showCrowAlert() {
        let inputElement = document.getElementById("numInput");
        let num = parseInt(inputElement.value, 10);

        if (isNaN(num)) {
            alert("Пожалуйста, введите целое число.");
            return;
        }

        let ending = getCrowEnding(num);
        alert("На ветке сидит " + num + " " + ending);
    }

    let button = document.getElementById("countButton");
    button.addEventListener("click", showCrowAlert);
</script>

</body>
</html>
