<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Считать ворон</title>
    
</head>
<body>

<div>
    <h1>Считать ворон</h1>
    <form id="crowForm">
        <label for="numInput">
            Количество ворон:
            <input type="number" id="numInput" name="num" required>
        </label>
        <br><br>
        <button type="button" id="countButton">Считать</button>
    </form>
</div>

<script>
    function getCrowEnding(num) {
        let lastDigit = num % 10;
        let lastTwoDigits = num % 100;

        switch (true) {
            case (lastTwoDigits >= 11 && lastTwoDigits <= 14):
                return "ворон";
            default:
                switch (lastDigit) {
                    case 1:
                        return "ворона";
                    case 2:
                    case 3:
                    case 4:
                        return "вороны";
                    default:
                        return "ворон";
                }
        }
    }

    function showCrowAlert() {
        let inputElement = document.getElementById("numInput");
        let num = parseInt(inputElement.value, 10);

        if (isNaN(num)) {
            alert("Пожалуйста, введите целое число.");
            return;
        }

        let ending = getCrowEnding(num);
        alert("На ветке сидит " + num + " " + ending);
    }

    let button = document.getElementById("countButton");
    button.addEventListener("click", showCrowAlert);
</script>

</body>
</html>
