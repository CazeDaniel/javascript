<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Ввод числа</title>
</head>
<body>
    <h1>"Ввод числа"</h1>
    <p>Нажмите на ссылку ниже</p>
    
    <a href="https://cazedaniel.github.io/javascript/" id="numberLink">Получить число</a>

     <script>
    'use strict';

    function promptForNumber() {
      while (true) {
        const input = prompt('Введите число больше 100:', '');
        if (input === null) {
          return false;
        }

        const number = parseFloat(input);


        if (!isNaN(number) && number > 100) {
          return true;
        }

      }
    }
    const link = document.getElementById('link');
    link.addEventListener('click', function(event) {

      event.preventDefault();


      const isValid = promptForNumber();

      if (isValid) {
   
        window.location.href = this.href;
      } else {
        window.location.href = '../index.html';
      }
    });
  </script>
</body>
</html>
